name: build
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js Environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Check
        run: pnpm build
        env:
          BETTER_AUTH_URL: "http://localhost:4321"
          BETTER_AUTH_SECRET: "s3qHhi1YX7TUQCGEPWKOVz0kJLzvS3w8puXxctKRJ8M=" # for testing, not a real secret
          DISCORD_CLIENT_ID: "000000000000000000"
          DISCORD_CLIENT_SECRET: "HYP87cR2r12XFnNGfTKkaHzq3OqtnjIf" # for testing, not a real secret
          DISCORD_ALLOWED_GUILD_ID: "000000000000000000"
