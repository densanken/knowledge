name: build
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false
          # contents:read 権限の fine-grained PAT が必要
          token: ${{ secrets.SUBMODULE_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js Environment
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .nvmrc

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Check
        run: pnpm build
        env:
          BETTER_AUTH_URL: "http://localhost:4321"
          BETTER_AUTH_SECRET: "s3qHhi1YX7TUQCGEPWKOVz0kJLzvS3w8puXxctKRJ8M=" # for testing, not a real secret
          DISCORD_CLIENT_ID: "000000000000000000"
          DISCORD_CLIENT_SECRET: "HYP87cR2r12XFnNGfTKkaHzq3OqtnjIf" # for testing, not a real secret
          DISCORD_ALLOWED_GUILD_ID: "000000000000000000"
