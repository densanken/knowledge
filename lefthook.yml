pre-commit:
  parallel: true
  commands:
    test:
      glob: "*.{test,spec}.{ts,tsx}"
      run: pnpm vitest run {staged_files}
    lint:
      glob: "*.{ts,tsx,astro}"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    format:
      run: pnpm prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
